name: Check Markdown links

on:
  schedule:
    - cron: "0 9 * * *"
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: tcort/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          config-file: "mlc_config.json"
